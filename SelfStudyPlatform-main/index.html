<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 플랫폼</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <div class="wrap" style="max-width:720px;margin:0 auto;padding:80px 20px;text-align:center">
    <h1 id="title">학습 플랫폼</h1>
    <p id="msg" style="color:#666; margin-top:16px">로그인 상태 확인 중...</p>
  </div>
  <script type="module">
    import { firebaseReady, firebaseError } from './shared/firebase-init.js';
    import { onAuthChange } from './shared/auth.js';

    const msgEl = document.getElementById('msg');

    if (!firebaseReady) {
      // Firebase 미설정 → 설정 필요 안내
      msgEl.innerHTML = `
        <strong style="color:#c00">Firebase 설정이 필요합니다.</strong><br><br>
        <span style="font-size:14px">${firebaseError || 'config.js가 placeholder 상태입니다.'}</span><br><br>
        <span style="font-size:13px">shared/config.js 파일에 실제 Firebase 설정 값을 입력한 뒤 새로고침하세요.<br>자세한 절차는 README.md 2번 항목 참고.</span>
      `;
    } else {
      // Firebase OK → 로그인 상태에 따라 리디렉트
      onAuthChange((user) => {
        if (user) {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('login.html');
        }
      });
    }
  </script>
</body>
</html>
