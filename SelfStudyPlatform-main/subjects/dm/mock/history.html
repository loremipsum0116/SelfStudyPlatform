<!DOCTYPE html>
<html lang="ko">
<head>
  <script type="module" src="../../../shared/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이산수학 · 모의고사 기록</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../shared/styles.css" />
  <style>
    .history-wrap { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .mock-card {
      border:1px solid #ddd; border-radius:10px; padding:20px; margin:16px 0;
      background:#fff;
    }
    .mock-card .row-top {
      display:flex; justify-content:space-between; align-items:baseline; gap:16px;
      flex-wrap:wrap;
    }
    .mock-card .big-score { font-size:28px; font-weight:700; }
    .mock-card .sub { font-size:13px; color:#666; }
    .mock-card .meta-row {
      display:flex; gap:20px; margin-top:8px; font-size:14px; color:#555;
      flex-wrap:wrap;
    }
    .mock-card details { margin-top:12px; }
    .mock-card details summary {
      cursor:pointer; font-size:13px; color:var(--accent);
    }
    .verdict-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));
      gap:6px; margin-top:10px;
    }
    .verdict-grid .cell {
      padding:6px 8px; border-radius:4px; font-size:12px;
      font-family:'JetBrains Mono', monospace;
    }
    .cell.correct { background:#d4edda; color:#155724; }
    .cell.incorrect { background:#f8d7da; color:#721c24; }
    .cell.partial { background:#fff3cd; color:#856404; }
    .empty { text-align:center; padding:60px 20px; color:#999; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="history-wrap">
      <div class="topbar" style="margin-bottom:20px">
        <a href="../index.html">← 과목 허브</a>
        <span style="margin:0 8px">·</span>
        <a href="index.html">모의고사 다시 풀기</a>
      </div>
      <h1>이산수학 · 모의고사 기록</h1>
      <p>최근 5회까지의 모의고사 결과가 표시됩니다. 항목을 펼치면 문항별 정오표도 확인할 수 있습니다.</p>
      <div id="history-list">
        <div class="note"><span class="lbl">Loading</span>기록을 불러오는 중...</div>
      </div>
    </div>
  </div>
  <script type="module">
    import { onAuthChange } from '../../../shared/auth.js';
    import '../../../shared/db.js';

    const SUBJECT_ID = 'dm';

    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }
    function fmtDuration(ms) {
      if (!ms) return '—';
      const s = Math.floor(ms / 1000);
      const mm = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    }
    function fmtPct(score) { return Math.round((score || 0) * 100) + '%'; }
    function chapterLabel(ch) {
      const labels = {
        ch1: 'Ch.1', ch2: 'Ch.2', ch3: 'Ch.3', ch4: 'Ch.4', ch5: 'Ch.5'
      };
      return labels[ch] || String(ch || '—').toUpperCase();
    }

    function renderDetails(details) {
      if (!Array.isArray(details) || !details.length) {
        return '<div class="sub">문항별 세부 기록이 없습니다.</div>';
      }
      return `<div class="verdict-grid">` + details.map((d, i) => {
        const cls = d.verdict || 'incorrect';
        const mark = d.verdict === 'correct' ? '✓'
                   : d.verdict === 'partial' ? '△' : '✗';
        return `<div class="cell ${cls}">${String(i+1).padStart(2,'0')} ${mark}</div>`;
      }).join('') + `</div>`;
    }

    async function render() {
      const listEl = document.getElementById('history-list');
      if (!window.__db) {
        listEl.innerHTML = '<div class="empty">DB 모듈 로드 실패</div>';
        return;
      }
      const mocks = await window.__db.getMockRecent(SUBJECT_ID);
      if (!mocks || !mocks.length) {
        listEl.innerHTML = '<div class="empty">아직 모의고사 기록이 없습니다.<br><br><a href="index.html" style="color:var(--accent)">지금 시작하기 →</a></div>';
        return;
      }
      listEl.innerHTML = mocks.map((m, i) => `
        <div class="mock-card">
          <div class="row-top">
            <div>
              <div class="big-score">${fmtPct(m.score)}</div>
              <div class="sub">${m.correct} / ${m.total} 정답</div>
            </div>
            <div class="sub" style="text-align:right">
              <div>#${mocks.length - i}회</div>
              <div>${fmtDate(m.date)}</div>
            </div>
          </div>
          <div class="meta-row">
            <span>소요시간: <strong>${fmtDuration(m.durationMs)}</strong></span>
            <span>문항 수: <strong>${m.total}</strong></span>
            <span>선택 챕터: <strong>${(m.chapterSelections || []).map(ch => chapterLabel(ch)).join(', ') || '—'}</strong></span>
          </div>
          ${Array.isArray(m.generationSummary) && m.generationSummary.length ? `<div class="sub" style="margin-top:8px">${m.generationSummary.map(g => `${g.title} · ${g.questionCount}문항`).join(' · ')}</div>` : ''}
          <details>
            <summary>문항별 결과 보기</summary>
            ${renderDetails(m.details)}
          </details>
        </div>
      `).join('');
    }

    onAuthChange(() => { render(); });
  </script>
</body>
</html>
