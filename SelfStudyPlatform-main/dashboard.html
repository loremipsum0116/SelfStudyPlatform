<!DOCTYPE html>
<html lang="ko">
<head>
  <script type="module" src="shared/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/styles.css" />
  <style>
    .dashboard { max-width:900px; margin:40px auto; padding:0 20px; }
    .subject-card { border:1px solid #ddd; padding:20px; border-radius:10px; margin:16px 0; background:#fff; }
    .subject-card .row-top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .subject-card h3 { margin:0; font-size:20px; border:none; padding:0; }
    .subject-card .desc { margin:4px 0 0 0; font-size:14px; color:var(--ink-soft); }
    .subject-card .actions a { margin-left:8px; text-decoration:none; color:var(--accent); font-weight:600; }
    .subject-card .summary { margin-top:16px; padding-top:16px; border-top:1px dashed #ddd; font-size:14px; }
    .subject-card .summary .row { display:flex; justify-content:space-between; padding:4px 0; }
    .subject-card .summary .muted { color:#999; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .header h1 { margin:0; font-size:28px; }
    .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .header-right a { font-size:12px; font-family:var(--mono); letter-spacing:.1em;
      text-transform:uppercase; text-decoration:none; color:var(--accent);
      padding:6px 12px; border:1px solid var(--accent); transition:all .15s; }
    .header-right a:hover { background:var(--accent); color:#fff; }
    .header-right a.admin-link { border-color:var(--warn); color:var(--warn); }
    .header-right a.admin-link:hover { background:var(--warn); color:#fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="dashboard">
      <div class="header">
        <h1>대시보드</h1>
        <div class="header-right">
          <span id="user-email" style="font-weight:bold;font-size:14px"></span>
          <a href="api-settings.html">AI API 등록</a>
          <a href="admin.html" id="admin-link" class="admin-link" style="display:none">👑 관리</a>
          <button id="logout-btn" class="btn" style="padding:6px 12px">로그아웃</button>
        </div>
      </div>

      <p>학습할 과목을 선택하세요. 각 과목 카드에 최근 학습 요약이 표시됩니다.</p>
      <div id="subjects-list"></div>
    </div>
  </div>

  <script type="module">
    import { onAuthChange, signOutUser } from './shared/auth.js';
    import { isSuperAdmin } from './shared/db.js';
    import './shared/db.js';

    const SUBJECTS = [
      {
        id: 'dm',
        title: '이산수학',
        description: '수의 체계, 공식과 점화식, 조합론과 그래프 등을 다룹니다.',
        hubLink: 'subjects/dm/index.html',
        mockLink: 'subjects/dm/mock/index.html',
        historyLink: 'subjects/dm/mock/history.html',
        chapters: [
          { id: 'ch1', title: 'Ch.1 수의 체계' },
          { id: 'ch2', title: 'Ch.2 공식과 점화식' },
          { id: 'ch3', title: 'Ch.3 조합론과 그래프' }
        ]
      },
      {
        id: 'co',
        title: '컴퓨터구조',
        description: '컴퓨터 추상화, MIPS, 연산 하드웨어와 부동소수점 표현을 다룹니다.',
        hubLink: 'subjects/co/index.html',
        conceptOnly: true,
        chapters: [
          { id: 'ch1', title: 'Ch.1 컴퓨터 추상화와 수 표현 기초' },
          { id: 'ch2', title: 'Ch.2 MIPS 명령어와 레지스터 · 제어 흐름' },
          { id: 'ch3', title: 'Ch.3 컴퓨터 연산과 부동소수점' }
        ]
      }
    ];

    const subjectsListEl = document.getElementById('subjects-list');
    const userEmailEl = document.getElementById('user-email');
    const logoutBtn = document.getElementById('logout-btn');
    const adminLink = document.getElementById('admin-link');


    logoutBtn.addEventListener('click', async () => {
      await signOutUser();
      window.location.href = 'login.html';
    });

    // ── Subject rendering (unchanged) ──
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }
    function fmtDuration(ms) {
      if (!ms) return '—';
      const s = Math.floor(ms / 1000);
      return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }
    function fmtPct(score) { return Math.round((score||0)*100) + '%'; }

    async function renderSubject(sub) {
      const card = document.createElement('div');
      card.className = 'subject-card';
      card.innerHTML = `
        <div class="row-top">
          <div><h3>${sub.title}</h3><div class="desc">${sub.description}</div></div>
          <div class="actions"><a href="${sub.hubLink}">과목 허브 →</a></div>
        </div>
        <div class="summary">
          <div class="muted">요약 로딩 중...</div>
        </div>`;
      subjectsListEl.appendChild(card);

      const sumEl = card.querySelector('.summary');
      const parts = [];

      if (sub.conceptOnly) {
        parts.push('<strong>수록된 개념 정리</strong>');
        for (const ch of sub.chapters) {
          parts.push(`<div class="row"><span>${ch.title}</span><span>개념 정리 제공</span></div>`);
        }
        parts.push('<div style="margin-top:12px" class="muted">이번 섹션은 개념 페이지만 먼저 연결되어 있습니다.</div>');
        sumEl.innerHTML = parts.join('');
        return;
      }

      if (window.__db) {
        try {
          const chSummaries = await window.__db.getPracticeSessionsForSubject(
            sub.id, sub.chapters.map(c => c.id));
          parts.push('<strong>최근 챕터 연습</strong>');
          for (const ch of sub.chapters) {
            const s = chSummaries[ch.id];
            if (s && s.lastDate) {
              parts.push(`<div class="row"><span>${ch.title}</span><span>${fmtDate(s.lastDate)} · ${fmtPct(s.score)} (${s.correct||0}/${s.total||0})</span></div>`);
            } else {
              parts.push(`<div class="row"><span>${ch.title}</span><span class="muted">기록 없음</span></div>`);
            }
          }
          const mocks = await window.__db.getMockRecent(sub.id);
          parts.push('<div style="margin-top:12px"></div><strong>최근 모의고사</strong>');
          if (mocks && mocks.length) {
            for (const m of mocks.slice(0,5)) {
              parts.push(`<div class="row"><span>${fmtDate(m.date)}</span><span>${fmtPct(m.score)} (${m.correct}/${m.total}) · ${fmtDuration(m.durationMs)}</span></div>`);
            }
            parts.push(`<div style="margin-top:6px"><a href="${sub.historyLink}" style="color:var(--accent);text-decoration:none">상세 보기 →</a></div>`);
          } else {
            parts.push('<div class="row"><span class="muted">아직 모의고사 기록이 없습니다.</span></div>');
          }
        } catch (err) {
          parts.push(`<div class="muted">요약 로드 실패: ${err.message}</div>`);
        }
      } else {
        parts.push('<div class="muted">DB 모듈 로드 실패</div>');
      }
      sumEl.innerHTML = parts.join('');
    }


    // ── Init ──
    onAuthChange(async (user) => {
      if (!user) return;
      userEmailEl.textContent = user.email;

      // 슈퍼 관리자면 관리 링크 표시
      if (isSuperAdmin()) {
        adminLink.style.display = 'inline-block';
      }

      // 과목 렌더링
      subjectsListEl.innerHTML = '';
      for (const sub of SUBJECTS) {
        await renderSubject(sub);
      }
    });
  </script>
</body>
</html>
