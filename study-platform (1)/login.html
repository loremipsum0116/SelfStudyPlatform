<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 / 회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/styles.css" />
  <style>
    .login-container { max-width: 380px; margin: 60px auto; padding: 24px; border: 1px solid #ccc; border-radius: 8px; background:#fff; }
    .login-container h1 { margin-bottom: 16px; font-size:24px; }
    .login-container label { display:block; margin-top:12px; font-size:14px; }
    .login-container input { width:100%; padding:8px; margin-top:4px; box-sizing: border-box; }
    .login-container button { margin-top:16px; padding:10px 16px; width:100%; }
    .switch { margin-top:16px; text-align:center; font-size:14px; }
    .err-msg { color: var(--err); margin-top:8px; font-size:14px; }
    .warn-msg { color: var(--warn); margin-top:8px; font-size:13px; }
    .info-msg { color: var(--accent-2); margin-top:12px; font-size:14px; line-height:1.7;
      padding:16px; background:#e8f0fe; border:1px solid #4285f4; border-radius:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="margin:20px"><a href="index.html">← 홈으로</a></div>
    <div class="login-container">
      <h1 id="form-title">로그인</h1>
      <div id="fb-warn" class="warn-msg" style="display:none"></div>
      <div id="error" class="err-msg" style="display:none"></div>
      <div id="info" class="info-msg" style="display:none"></div>
      <div id="form-fields">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="you@example.com" />
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="********" />
        <button id="submit-btn" class="btn-submit">로그인</button>
        <div class="switch" id="switch-text">계정이 없으신가요? <a href="#" id="toggle-mode">가입 신청 / 회원가입</a></div>
      </div>
    </div>
  </div>
  <script type="module">
    import { signUp, signIn, signOutUser, onAuthChange, isFirebaseReady, getFirebaseError } from './shared/auth.js';
    import { createUserProfile, getUserProfile, getSignupRequestByEmail, createSignupRequest } from './shared/db.js';

    const errorEl   = document.getElementById('error');
    const infoEl    = document.getElementById('info');
    const warnEl    = document.getElementById('fb-warn');
    const submitBtn = document.getElementById('submit-btn');
    const formFields = document.getElementById('form-fields');

    // 회원가입 처리 중 onAuthChange 무시 플래그
    let signupInProgress = false;

    if (!isFirebaseReady()) {
      warnEl.style.display = 'block';
      warnEl.textContent = (getFirebaseError() || 'Firebase 미설정') +
        ' — shared/config.js에 Firebase 설정을 입력해야 로그인할 수 있습니다.';
      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 불가 (설정 필요)';
    }

    let mode = 'login';

    function setMode(newMode) {
      mode = newMode;
      errorEl.style.display = 'none';
      infoEl.style.display = 'none';
      if (mode === 'login') {
        document.getElementById('form-title').textContent = '로그인';
        submitBtn.textContent = '로그인';
        document.getElementById('switch-text').innerHTML =
          '계정이 없으신가요? <a href="#" id="toggle-mode">가입 신청 / 회원가입</a>';
      } else {
        document.getElementById('form-title').textContent = '가입 신청 / 회원가입';
        submitBtn.textContent = '가입 진행';
        document.getElementById('switch-text').innerHTML =
          '이미 계정이 있으신가요? <a href="#" id="toggle-mode">로그인</a><div style="margin-top:8px;color:#666;line-height:1.6">일반 계정은 먼저 관리자 승인 요청을 보낸 뒤, 승인되면 같은 이메일로 실제 회원가입이 가능합니다.</div>';
      }
      document.getElementById('toggle-mode').addEventListener('click', (e) => {
        e.preventDefault(); setMode(mode === 'login' ? 'signup' : 'login');
      });
    }

    submitBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      infoEl.style.display = 'none';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        errorEl.textContent = '이메일과 비밀번호를 입력하세요.';
        errorEl.style.display = 'block';
        return;
      }
      submitBtn.disabled = true;

      try {
        if (mode === 'signup') {
          const normalizedEmail = email.toLowerCase();

          if (normalizedEmail === 'sst7050@naver.com') {
            signupInProgress = true;
            const user = await signUp(normalizedEmail, password);
            await createUserProfile(user.uid, normalizedEmail);
            signupInProgress = false;
            window.location.href = 'dashboard.html';
            return;
          }

          const req = await getSignupRequestByEmail(normalizedEmail);

          if (!req || req.status === 'denied') {
            await createSignupRequest(normalizedEmail);
            formFields.style.display = 'none';
            document.getElementById('form-title').textContent = '승인 요청 접수';
            infoEl.innerHTML =
              '✅ 관리자에게 가입 승인 요청을 보냈습니다.<br><br>' +
              '아직 실제 회원가입은 진행되지 않았습니다.<br>' +
              '승인 후 같은 이메일과 비밀번호로 다시 들어와 가입을 완료해주세요.<br><br>' +
              '<a href="login.html" style="color:var(--accent);font-weight:600">← 로그인 페이지로</a>';
            infoEl.style.display = 'block';
            return;
          }

          if (req.status === 'pending') {
            throw new Error('현재 관리자 승인 대기 중입니다. 승인 후 같은 이메일로 다시 가입을 진행해주세요.');
          }

          signupInProgress = true;
          const user = await signUp(normalizedEmail, password);
          await createUserProfile(user.uid, normalizedEmail);
          signupInProgress = false;
          window.location.href = 'dashboard.html';
        } else {
          // ── 로그인 ──
          await signIn(email, password);
          // onAuthChange가 프로필 확인 후 처리
        }
      } catch (err) {
        signupInProgress = false;
        errorEl.textContent = err.message || '오류가 발생했습니다.';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById('toggle-mode').addEventListener('click', (e) => {
      e.preventDefault(); setMode(mode === 'login' ? 'signup' : 'login');
    });

    // 로그인 시에만 동작하는 상태 체크
    onAuthChange(async (user) => {
      if (!user || signupInProgress) return;

      const profile = await getUserProfile(user.uid);

      if (!profile) {
        // 프로필 없는 기존 유저 → 프로필 생성 후 로그아웃
        await createUserProfile(user.uid, user.email);
        if ((user.email || '').toLowerCase() === 'sst7050@naver.com') {
          window.location.href = 'dashboard.html';
          return;
        }
        await signOutUser();
        infoEl.innerHTML = '⏳ 관리자 승인 대기 중입니다. 승인 후 다시 로그인해주세요.';
        infoEl.style.display = 'block';
        return;
      }

      if (profile.status === 'approved') {
        window.location.href = 'dashboard.html';
      } else if (profile.status === 'denied') {
        await signOutUser();
        errorEl.textContent = '접근이 거부되었습니다. 관리자에게 문의하세요.';
        errorEl.style.display = 'block';
      } else {
        // pending
        await signOutUser();
        infoEl.innerHTML = '⏳ 관리자 승인 대기 중입니다.<br>승인이 완료되면 다시 로그인해주세요.';
        infoEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
